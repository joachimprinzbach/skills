name: Commitlint
# semantic-release derives the version from Conventional Commits, so PR commits
# must follow that format. Lint the commits a PR adds against its base.
on:
  pull_request:

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      # Install into ./node_modules (not package.json) so commitlint can resolve
      # the `extends: @commitlint/config-conventional` from the repo root. With
      # `npx -p` the shareable config lands in a temp prefix that resolve-extends
      # can't see from cwd, which fails with MODULE_NOT_FOUND.
      - run: npm install --no-save @commitlint/cli@19 @commitlint/config-conventional@19
      - run: npx commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose
