name: CI
# Run the dependency-free CLI test suite on every PR and on pushes to main.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: node --test "test/**/*.test.mjs"
